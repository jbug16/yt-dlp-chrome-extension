<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e1e1e1;
    }

    .header {
      background: #1a1a1a;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #2a2a2a;
    }

    .header svg {
      width: 20px;
      height: 20px;
      fill: #ff4444;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .not-youtube {
      padding: 40px 20px;
      text-align: center;
      color: #888;
      font-size: 13px;
    }

    .not-youtube svg {
      width: 48px;
      height: 48px;
      fill: #333;
      margin-bottom: 12px;
    }

    .video-info {
      padding: 16px;
    }

    .thumbnail-wrap {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .thumbnail-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    .video-title {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 4px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-channel {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    select {
      flex: 1;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e1e1e1;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    select:hover {
      border-color: #444;
    }

    select:focus {
      border-color: #ff4444;
    }

    .download-btn {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      background: #ff4444;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .download-btn:hover {
      background: #e63939;
    }

    .download-btn:active {
      background: #cc3333;
    }

    .download-btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }

    .status.downloading {
      display: block;
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      color: #6be66b;
    }

    .status.complete {
      display: block;
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      color: #6be66b;
    }

    .status.error {
      display: block;
      background: #2a1a1a;
      border: 1px solid #4a2a2a;
      color: #e66b6b;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #6be66b;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .finder-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 12px;
      border-radius: 5px;
      border: 1px solid #2a4a2a;
      background: #1a2a1a;
      color: #6be66b;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .finder-btn:hover {
      background: #2a3a2a;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24"><path d="M23.5 6.2c-.3-1-1-1.8-2-2.1C19.6 3.5 12 3.5 12 3.5s-7.6 0-9.5.6c-1 .3-1.7 1.1-2 2.1C0 8.1 0 12 0 12s0 3.9.5 5.8c.3 1 1 1.8 2 2.1 1.9.6 9.5.6 9.5.6s7.6 0 9.5-.6c1-.3 1.7-1.1 2-2.1.5-1.9.5-5.8.5-5.8s0-3.9-.5-5.8zM9.5 15.6V8.4l6.4 3.6-6.4 3.6z"/></svg>
    <h1>YouTube Downloader</h1>
  </div>

  <div id="not-youtube" class="not-youtube" style="display:none;">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    <p>Navigate to a YouTube video to download it.</p>
  </div>

  <div id="video-info" class="video-info" style="display:none;">
    <div class="thumbnail-wrap">
      <img id="thumbnail" src="" alt="Video thumbnail">
    </div>
    <div id="video-title" class="video-title"></div>
    <div id="video-channel" class="video-channel"></div>

    <div class="controls">
      <select id="quality">
        <option value="best">Best (video+audio)</option>
        <option value="1080">1080p</option>
        <option value="720">720p</option>
        <option value="480">480p</option>
        <option value="360">360p</option>
        <option value="audio">Audio only (mp3)</option>
      </select>
      <button id="download-btn" class="download-btn">Download</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
